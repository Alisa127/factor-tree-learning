<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Factor Tree - เรียนรู้การแยกตัวประกอบ</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f9;padding:20px}
.card{max-width:1400px;margin:auto;background:#fff;padding:20px;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.center{text-align:center}
.hidden{display:none}
input,button{padding:8px;font-size:16px}
#treeWrap{display:flex;justify-content:center;overflow:auto;min-height:650px}
#treeArea{position:relative;width:1800px;height:1000px}
.node{
position:absolute;width:90px;height:55px;border:2px solid #333;border-radius:10px;
display:flex;align-items:center;justify-content:center;font-weight:bold;background:white;
}
.root{background:#bfdbfe}
.prime{background:#bbf7d0}
.comp{background:#fde68a}
.error{background:#fecaca}
.nodeInput{
position:absolute;width:90px;height:55px;border:2px dashed #999;border-radius:10px;
text-align:center;font-size:18px;
}
#result{font-size:22px;font-weight:bold;margin-bottom:15px}
.legend{margin-bottom:10px}
</style>
</head>
<body>
<div class="card center" id="page1">
<h1>🌳 Factor Tree Learning v7</h1>
<p>กรอกเลขที่ต้องการแยกตัวประกอบ</p>
<input id="startNum" type="number" value="24" min="2">
<button onclick="startGame()">เริ่ม</button>
</div>

<div class="card hidden" id="page2">
<div id="result"></div>
<div class="legend">🟩 จำนวนเฉพาะ | 🟨 แยกต่อได้ | 🟥 ผิด</div>
<div id="treeWrap">
<div id="treeArea">
<svg id="svg" width="1800" height="1000" style="position:absolute"></svg>
</div>
</div>
<br>
<button id="restartBtn" class="hidden" onclick="location.reload()">🔄 กลับหน้าแรก</button>
</div>

<script>
let root,idSeq=1;

function prime(n){if(n<2)return false;for(let i=2;i<=Math.sqrt(n);i++)if(n%i===0)return false;return true;}
function makeNode(v){return {id:idSeq++,value:v,children:[],invalid:false};}

function startGame(){
 root=makeNode(parseInt(startNum.value));
 page1.classList.add('hidden');
 page2.classList.remove('hidden');
 render();
}

function leafCount(n){
 if(n.children.length===0) return 1;
 return leafCount(n.children[0])+leafCount(n.children[1]);
}

function layout(node,left,right,depth,arr){
 let x=(left+right)/2;
 let y=40+depth*150;
 arr.push({node,x,y});
 if(node.children.length===2){
   let lc=leafCount(node.children[0]);
   let rc=leafCount(node.children[1]);
   let total=lc+rc;
   let split=left+(right-left)*(lc/total);
   layout(node.children[0],left,split,depth+1,arr);
   layout(node.children[1],split,right,depth+1,arr);
 }
}

function render(){
 svg.innerHTML='';
 document.querySelectorAll('.node,.nodeInput').forEach(e=>e.remove());

 let items=[];
 layout(root,50,1700,0,items);

 let pos={};
 items.forEach(i=>pos[i.node.id]=i);

 items.forEach(i=>{
   if(i.node.children.length===2){
     let l=pos[i.node.children[0].id];
     let r=pos[i.node.children[1].id];
     drawLine(i.x+45,i.y+55,l.x+45,l.y);
     drawLine(i.x+45,i.y+55,r.x+45,r.y);
   }
 });

 items.forEach(i=>drawNode(i.node,i.x,i.y));
 updateResult();
}

function drawLine(x1,y1,x2,y2){
 let l=document.createElementNS("http://www.w3.org/2000/svg","line");
 l.setAttribute("x1",x1); l.setAttribute("y1",y1);
 l.setAttribute("x2",x2); l.setAttribute("y2",y2);
 l.setAttribute("stroke","#333");
 l.setAttribute("stroke-width","2");
 svg.appendChild(l);
}

function drawNode(node,x,y){
 let d=document.createElement('div');
 d.className='node '+(node.invalid?'error':node===root?'root':prime(node.value)?'prime':'comp');
 d.style.left=x+'px'; d.style.top=y+'px';
 d.textContent=node.value;
 treeArea.appendChild(d);

 if(!prime(node.value) && node.children.length===0){
   let left=document.createElement('input');
   left.className='nodeInput';
   left.placeholder='?';
   left.style.left=(x-120)+'px';
   left.style.top=(y+130)+'px';

   let right=document.createElement('input');
   right.className='nodeInput';
   right.placeholder='?';
   right.style.left=(x+120)+'px';
   right.style.top=(y+130)+'px';

   left.onchange=right.onchange=()=>{
      let a=parseInt(left.value);
      let b=parseInt(right.value);
      if(!a || !b) return;

      if(a*b!==node.value){
        node.invalid=true;
        render();
        return;
      }

      node.invalid=false;
      node.children=[makeNode(a),makeNode(b)];
      render();
   };

   treeArea.appendChild(left);
   treeArea.appendChild(right);
   drawLine(x+45,y+55,x-75,y+130);
   drawLine(x+45,y+55,x+165,y+130);
 }
}

function finished(n){
 if(n.children.length===0) return prime(n.value);
 return n.children.every(finished);
}

function leaves(n,arr=[]){
 if(n.children.length===0){arr.push(n.value);return arr;}
 n.children.forEach(c=>leaves(c,arr));
 return arr;
}

function updateResult(){
 if(!finished(root)){
   result.innerHTML='🟨 เติมตัวเลขในช่อง ? ของแต่ละกิ่ง';
   return;
 }
 let f=leaves(root).sort((a,b)=>a-b);
 result.innerHTML='✅ สำเร็จ<br><br>'+root.value+' = '+f.join(' × ');
 restartBtn.classList.remove('hidden');
}
</script>
</body>
</html>
